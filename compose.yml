version: "3.9"
services:
  web:
    build: .
    image: role_fortal_backend:latest
    container_name: artigos_opovo_web
    command: ["python", "site.py"]
    ports:
      - "5001:5001"
    volumes:
      - data:/app/data
    restart: always

  fetcher:
    build: .
    image: role_fortal_backend:latest
    container_name: artigos_opovo_fetcher
    command: ["python", "fetch_opovo.py"]
    volumes:
      - data:/app/data

  frontend:
    build: ../roles_fortal_frontend/roles-fortal
    image: role_fortal_frontend:latest
    container_name: artigos_opovo_frontend
    ports:
      - "3000:80"
    depends_on:
      - web

volumes:
  data:
